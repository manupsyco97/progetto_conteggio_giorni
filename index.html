<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conteggio giorni</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header>
        <section class="container-fluid">
            <h1 class="text-center my-5 display-1 fw-bold">Conteggio giorni</h1>
        </section>
    </header>

    <main>
        <section class="container">
            <form class="row d-flex flex-column align-items-center">
                <div class="col-4">
                    <div class="input-group mb-3">
                        <span class="input-group-text" id="labelPartenza">Data Partenza</span>
                        <input id="dataPartenza" type="date" class="form-control" name="dataPartenza" required>
                    </div>
                </div>
                <div class="col-4">
                    <div class="input-group mb-3">
                        <span class="input-group-text" id="labelRitorno">Data Ritorno</span>
                        <input id="dataRitorno" type="date" class="form-control" name="dataRitorno" required>
                    </div>
                </div>
                <div class="col-4 d-grid">
                    <button id="btnSubmit" type="submit" class="btn btn-primary mt-2">Aggiungi data</button>
                </div>
            </form>

            <form action="#" class="row justify-content-center d-flex-align-items-center my-5">
                
                <div class="col-4 d-grid">
                    <button id="btnShowDates" type="button" class="btn btn-primary mt-2">Mostra Date</button>
                </div>
            </form>
        </section>


        <section class="container my-5">
            <div class="row justify-content-center" id="dateWrapper">

                <!-- CARD GENERATE DINAMICAMENTE CON JS -->

            </div> 
        </section>
    </main>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./main.js"></script>
</body>

</html>
