<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Schengen Days Counter</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header class="container text-center my-5">
        <h1 class="display-4 fw-extrabold main-title">
            <i class="bi bi-globe-americas me-2 text-success"></i>Conteggio Giorni Schengen
        </h1>
        <p class="text-muted text-uppercase tracking-wider small fw-bold">Verifica il rispetto della regola dei 90/180
            giorni</p>
    </header>

    <main class="container">

        <div class="row justify-content-center mb-5">
            <div class="col-12 col-md-6 col-lg-5 my-2">
                <div class="status-card h-100">
                    <div class="d-flex align-items-center mb-3">
                        <div class="icon-shape bg-success-subtle text-success me-3">
                            <i class="bi bi-calendar-check-fill"></i>
                        </div>
                        <div>
                            <h5 class="m-0 card-title-text">Giorni usati ad oggi</h5>
                            <small class="text-muted-custom">Finestra mobile degli ultimi 180 giorni</small>
                        </div>
                    </div>
                    <div id="counterOggiWrapper" class="display-4 fw-bold text-success counter-value">0 / 90</div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-5 my-2">
                <div class="status-card h-100">
                    <div class="d-flex align-items-center mb-3">
                        <div class="icon-shape bg-primary-subtle text-primary me-3">
                            <i class="bi bi-sliders2"></i>
                        </div>
                        <div>
                            <h5 class="m-0 card-title-text">Stato della pianificazione</h5>
                            <small class="text-muted-custom">Picco massimo nei viaggi futuri inseriti</small>
                        </div>
                    </div>
                    <div id="counterFuturoWrapper" class="display-4 fw-bold text-primary counter-value">0 / 90</div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="form-container">
                    <h3 class="fs-5 fw-bold mb-4"><i class="bi bi-plus-circle me-2 text-success"></i>Registra un nuovo
                        viaggio</h3>
                    <form class="row g-3">
                        <div class="col-12 col-md-5">
                            <div class="custom-input-group">
                                <label for="dataPartenza" class="custom-label">Data Partenza</label>
                                <div class="input-with-icon">
                                    <i class="bi bi-airplane-engines input-icon"></i>
                                    <input id="dataPartenza" type="date" class="form-control custom-input" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-5">
                            <div class="custom-input-group">
                                <label for="dataRitorno" class="custom-label">Data Ritorno</label>
                                <div class="input-with-icon">
                                    <i class="bi bi-airplane input-icon icon-flipped"></i>
                                    <input id="dataRitorno" type="date" class="form-control custom-input" required>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-2 d-flex align-items-end">
                            <button id="btnSubmit" type="submit" class="btn btn-success-custom w-100 fw-bold py-2">
                                <i class="bi bi-plus-lg me-1"></i>Aggiungi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-12 col-md-10 col-lg-8 d-grid">
                <button id="btnShowDates" type="button" class="btn btn-outline-custom fw-bold py-2">
                    <i class="bi bi-eye me-2"></i>Mostra Storico Viaggi
                </button>
            </div>
        </div>

        <div class="row justify-content-center" id="dateWrapper">
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./main.js"></script>
</body>

</html>
